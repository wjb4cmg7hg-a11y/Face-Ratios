name: Deploy Face-Ratios to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.20.0'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 'latest'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Face-Ratios
        run: pnpm --filter @workspace/face-ratio run build
        env:
          PORT: 22567
          BASE_PATH: /Face-Ratios/

      - name: Deploy to GitHub Pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./artifacts/face-ratio/dist/public
          publish_branch: gh-pages
          user_name: github-actions
          user_email: github-actions@github.com
          commit_message: Deploy Face-Ratios to GitHub Pages
